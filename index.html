<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para el Amor de Mi Vida 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;
}

/* Pantalla inicial */
#inicio {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

button {
  padding: 12px 20px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  margin: 10px;
  cursor: pointer;
}

#si {
  background: #ff4d6d;
  color: white;
}

#no {
  background: white;
  color: #ff4d6d;
  position: relative;
}

/* Contador */
#contador {
  margin-top: 20px;
  font-size: 18px;
  color: #333;
}

/* Álbum */
.scene {
  width: 90%;
  max-width: 400px;
  height: 300px;
  margin: auto;
  perspective: 1500px;
  display: none;
}

.album {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.5s;
}

.scene.abierto .album {
  transform: rotateY(-180deg);
}

.cover, .pages {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.cover {
  background: #ff4d6d;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 22px;
  font-weight: bold;
}

.pages {
  background: white;
  transform: rotateY(180deg);
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

.pages img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="inicio">
  <h1>¿Quieres seguir viviendo esta historia conmigo? 💕</h1>

  <div>
    <button id="si" onclick="aceptar()">Sí 💖</button>
    <button id="no" onmouseover="moverNo()">No 😅</button>
  </div>

  <div id="contador"></div>
</div>

<div class="scene" id="albumScene">
  <div class="album">
    <div class="cover">Nuestro Álbum 💕</div>
    <div class="pages">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
      <img src="foto4.jpg">
      <img src="foto5.jpg">
      <img src="foto6.jpg">
      <img src="foto7.jpg">
      <img src="foto8.jpg">
      <img src="foto9.jpg">
    </div>
  </div>
</div>

<audio id="musica" loop>
  <source src="Enamorados.mp3" type="audio/mpeg">
</audio>

<script>
// Contador (CAMBIA LA FECHA POR LA TUYA)
const fechaInicio = new Date("2022-01-01");
function actualizarContador() {
  const ahora = new Date();
  const diferencia = ahora - fechaInicio;
  const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
  document.getElementById("contador").innerText =
    "Llevamos " + dias + " días juntos 💕";
}
setInterval(actualizarContador, 1000);
actualizarContador();

// Botón No se mueve
function moverNo() {
  const btn = document.getElementById("no");
  btn.style.position = "absolute";
  btn.style.left = Math.random() * 70 + "%";
  btn.style.top = Math.random() * 70 + "%";
}

// Aceptar
function aceptar() {
  const audio = document.getElementById("musica");
  audio.play();

  document.getElementById("inicio").style.display = "none";
  document.getElementById("albumScene").style.display = "block";

  setTimeout(() => {
    document.getElementById("albumScene").classList.add("abierto");
  }, 300);
}
</script>

</body>
</html>
