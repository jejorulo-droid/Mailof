<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro Álbum 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.scene {
  width: 400px;
  height: 300px;
  perspective: 1500px;
}

.album {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 2s;
}

.scene:hover .album {
  transform: rotateY(-180deg);
}

.cover, .pages {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.cover {
  background: #ff4d6d;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 24px;
  font-weight: bold;
}

.pages {
  background: white;
  transform: rotateY(180deg);
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

.pages img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  transition: transform 0.3s;
}

.pages img:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<div class="scene">
  <div class="album">
    
    <div class="cover">
      Nuestro Álbum 💕
    </div>

    <div class="pages">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
      <img src="foto4.jpg">
      <img src="foto5.jpg">
      <img src="foto6.jpg">
      <img src="foto7.jpg">
      <img src="foto8.jpg">
      <img src="foto9.jpg">
    </div>

  </div>
</div>

</body>
</html>
