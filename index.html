<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para el Amor de Mi Vida 💖</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Pantalla inicial */
#inicio {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  text-align: center;
}

#inicio button {
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  margin-top: 20px;
}

/* Álbum */
.scene {
  width: 90%;
  max-width: 400px;
  height: 300px;
  perspective: 1500px;
  display: none;
}

.album {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.5s;
}

.scene.abierto .album {
  transform: rotateY(-180deg);
}

.cover, .pages {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.cover {
  background: #ff4d6d;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 22px;
  font-weight: bold;
}

.pages {
  background: white;
  transform: rotateY(180deg);
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
}

.pages img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  transition: transform 0.3s;
}

.pages img:hover {
  transform: scale(1.08);
}
</style>
</head>

<body>

<!-- Pantalla de inicio -->
<div id="inicio">
  <h1>💌 Tengo algo para ti 💌</h1>
  <button onclick="iniciar()">Toca para abrir 💖</button>
</div>

<!-- Álbum -->
<div class="scene" id="albumScene">
  <div class="album">
    <div class="cover">
      Nuestro Álbum 💕
    </div>

    <div class="pages">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
      <img src="foto4.jpg">
      <img src="foto5.jpg">
      <img src="foto6.jpg">
      <img src="foto7.jpg">
      <img src="foto8.jpg">
      <img src="foto9.jpg">
    </div>
  </div>
</div>

<!-- Música -->
<audio id="musica" loop>
  <source src="Enamorados.mp3" type="audio/mpeg">
</audio>

<script>
function iniciar() {
  document.getElementById("musica").play();
  document.getElementById("inicio").style.display = "none";
  document.getElementById("albumScene").style.display = "block";
  setTimeout(() => {
    document.getElementById("albumScene").classList.add("abierto");
  }, 300);
}
</script>

</body>
</html>
